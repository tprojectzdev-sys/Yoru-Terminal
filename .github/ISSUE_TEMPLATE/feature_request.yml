name: Feature request
description: Idea for installer, docs, diagnostics, or ecosystem (not new themes right now)
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: input
    id: windows_version
    attributes:
      label: Your Windows version (optional)
    validations:
      required: false
  - type: input
    id: wt_version
    attributes:
      label: Windows Terminal version (optional)
    validations:
      required: false
  - type: input
    id: ps_version
    attributes:
      label: PowerShell version (optional)
    validations:
      required: false
  - type: dropdown
    id: host
    attributes:
      label: Primary terminal (optional)
      options:
        - Windows Terminal
        - Classic console (conhost)
        - VS Code terminal
        - Other / not sure
    validations:
      required: false
  - type: textarea
    id: doctor
    attributes:
      label: Doctor output (optional)
      render: shell
    validations:
      required: false
